experiment:
  name: "bcra-exo-task-feasibility"
  seed: 42

external_exo:
  mode: "external"
  source_dir: "~/repo/paper/third_party/exo"
  freeze_manifest_path: "artifacts/inference-E2E/freeze/exo_env_manifest.json"
  expected_instance_ids_by_node_count:
    "1":
      - "3e22dcea-2b10-4638-b914-a5f9589a65b6"
    "2":
      - "d0da6590-0aa8-4c0e-a3b7-e751a1d951a7"
    "3":
      - "3e22dcea-2b10-4638-b914-a5f9589a65b6"

requester:
  requester_id: "johnlee"
  requester_ip: "192.168.31.189"

endpoints:
  # EXO cluster entry.
  entry_url: "http://192.168.31.159:52415"
  # Requester-side callback service reachable by providers.
  requester_callback_url: "http://192.168.31.189:18081/task-result"

providers:
  - node_id: "jlmini_1"
    ip: "192.168.31.52"
    exo_port: 52415
    launcher_url: "http://192.168.31.52:18080"
    public_key_path: "artifacts/inference-E2E/provider/keys/jlmini_1_public.pem"
  - node_id: "jlmini_2"
    ip: "192.168.31.159"
    exo_port: 52415
    launcher_url: "http://192.168.31.159:18080"
    public_key_path: "artifacts/inference-E2E/provider/keys/jlmini_2_public.pem"
  - node_id: "jlmini_3"
    ip: "192.168.31.83"
    exo_port: 52415
    launcher_url: "http://192.168.31.83:18080"
    public_key_path: "artifacts/inference-E2E/provider/keys/jlmini_3_public.pem"

model:
  model_id: "mlx-community/Qwen3-0.6B-8bit"

tokenizer:
  model_id: "mlx-community/Qwen3-0.6B-8bit"
  local_files_only: false

ipfs:
  mode: "kubo_local"
  api_url: "http://127.0.0.1:5001/api/v0"
  gateway_url: "http://192.168.31.189:8080"

task:
  prompt_file: "artifacts/inference-E2E/requester/prompt.md"
  schedule_path: "artifacts/inference-E2E/requester/task_schedule.json"
  question_count: 20
  smoke_question_count: 5
  tasks_per_cell: 5
  schedule_seed: 42
  pair_across_network_profiles: true

network_profiles:
  LAN:
    target_spec: ""
  WAN:
    target_spec: "192.168.31.52:22:120:0.5,192.168.31.159:45:60:1.5,192.168.31.83:80:40:2.0"

matrix:
  network_profiles:
    - "LAN"
    - "WAN"
  instance_node_counts: [1, 2, 3]
  instance_node_counts_by_network:
    LAN: [1, 2, 3]
    WAN: [3]

control_plane:
  before_cell_commands: []
  before_network_commands:
    LAN: []
    WAN: []

orchestrator:
  requester:
    ssh_target: "MacBook"
    repo_root: "/Users/johnlee/repo/paper/exp_exo"
    python_bin: "python3"
  local_results_root: "/Users/johnlee/repo/paper/exp_exo/artifacts/inference-E2E/output"
  wan_prepare_commands:
    - "cd /Users/johnlee/repo/paper/exp_exo && bash artifacts/inference-E2E/provider/manage_provider.sh lan-reset-frozen 192.168.31.159"
    - "ssh Mac1 'cd /Users/jlmini_1/repo/paper/exp_exo && bash artifacts/inference-E2E/provider/manage_provider.sh lan-reset-frozen 192.168.31.52'"
    - "ssh Mac3 'cd /Users/jlmini_3/repo/paper/exp_exo && bash artifacts/inference-E2E/provider/manage_provider.sh lan-reset-frozen 192.168.31.83'"

runtime:
  timeout_sec: 7200
  cluster_stabilization_timeout_sec: 180
  cluster_stabilization_poll_sec: 2
  cluster_stabilization_consecutive_successes: 3
  batch_fail_fast: true
  output_root: "artifacts/inference-E2E/output"
