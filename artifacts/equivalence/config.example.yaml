experiment:
  name: "bcra-exo-equivalence"
  seed: 42
  output_root: "artifacts/equivalence/output"
  shared_sample_path: "artifacts/equivalence/output/sampled_questions.json"
  freeze_manifest_path: "artifacts/inference-E2E/freeze/exo_env_manifest.json"
  cluster_stabilization_timeout_sec: 180
  cluster_stabilization_poll_sec: 2
  cluster_stabilization_consecutive_successes: 3
  instance_ready_wait_sec: 600
  instance_ready_poll_sec: 5

dataset:
  hf_dataset: "openai/gsm8k"
  subset: "main"
  split: "test"
  sample_size: 100

model:
  model_id: "mlx-community/Qwen3-0.6B-8bit"

prompt:
  system_prompt: ""
  user_template: |
    Solve the following math word problem.
    Show your reasoning briefly if needed.
    The last line of your response must be exactly:
    Final Answer: <answer>

    Problem:
    {question}

decoding:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 512
  stream: false
  reasoning_effort: "none"
  enable_thinking: false
  timeout_sec: 180

one_device:
  label: "1-device exo"
  namespace: "equiv-1device"
  exo_home: ".exo-equivalence-1device"
  entry_url: "http://192.168.31.159:52415"
  target_nodes:
    - name: "Mac mini2"
      node_tag: "jlmini_2"
      ip: "192.168.31.159"
      access: "local"
      project_root: "/Users/jlmini_2/repo/paper/bc-ra-paper"
      exo_dir: "/Users/jlmini_2/repo/paper/third_party/exo"

